<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Cheat Sheet — Abyss</title>
<style>
:root{
  --bg:#000C18;
  --bg-secondary:#081729;
  --card:#10213A;
  --card-hover:#132846;
  --border:#1E4A7A;
  --accent:#007ACC;
  --accent-2:#00B7FF;
  --text:#EAF5FF;
  --text-secondary:#A8C7E8;
  --success:#4CAF50;
  --radius:14px;
  --radius-sm:8px;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:radial-gradient(ellipse at top,#001428 0%,#000C18 55%,#000814 100%);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-secondary);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent);}

.app{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  position:sticky;top:0;height:100vh;
  background:linear-gradient(180deg,rgba(8,23,41,.96),rgba(0,12,24,.98));
  border-right:1px solid var(--border);
  padding:20px 14px;overflow-y:auto;
  backdrop-filter:blur(10px);z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 20px 10px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.brand-dot{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--accent-2),var(--accent));box-shadow:0 0 12px var(--accent-2);animation:pulse 2.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.2);}}
.brand-text{font-weight:700;font-size:15px;}
.brand-sub{font-size:11px;color:var(--text-secondary);}

.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--text-secondary);font-size:13.5px;margin-bottom:2px;user-select:none;
  transition:background .18s ease,color .18s ease,transform .18s ease;
}
.nav-item:hover{background:var(--card-hover);color:var(--text);transform:translateX(3px);}
.nav-item.active{background:linear-gradient(90deg,rgba(0,122,204,.28),rgba(0,183,255,.05));color:#fff;box-shadow:inset 3px 0 0 var(--accent-2);}
.nav-count{margin-left:auto;font-size:10.5px;background:rgba(0,122,204,.2);color:var(--accent-2);padding:2px 7px;border-radius:20px;min-width:22px;text-align:center;transition:transform .2s ease;}

/* MAIN */
.main{padding:0 32px 60px 32px;min-width:0;}
.header{
  position:sticky;top:0;z-index:40;background:rgba(0,12,24,.86);backdrop-filter:blur(14px);
  padding:22px 0 16px 0;border-bottom:1px solid var(--border);margin-bottom:24px;
}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.title{font-size:28px;font-weight:800;background:linear-gradient(90deg,#fff,var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.subtitle{color:var(--text-secondary);font-size:13px;margin-top:2px;}

.search-wrap{position:relative;flex:1;min-width:240px;max-width:480px;}
.search-input{
  width:100%;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text);
  padding:11px 14px 11px 38px;border-radius:10px;font-size:13.5px;outline:none;
  transition:border-color .2s ease,box-shadow .2s ease;
}
.search-input:focus{border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(0,183,255,.15);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:14px;}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-secondary);border:1px solid var(--border);padding:2px 6px;border-radius:5px;}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.btn{
  background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:8px;
  font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);
  transition:background .18s ease,transform .18s ease,box-shadow .18s ease;
}
.btn:hover{background:var(--accent);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,122,204,.35);}
.btn:active{transform:translateY(0);}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;}
.btn.ghost{background:transparent;}

.category-section{margin-bottom:44px;}
.category-heading{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px dashed var(--border);}
.count-pill{font-size:11px;background:var(--card);border:1px solid var(--border);color:var(--text-secondary);padding:3px 9px;border-radius:20px;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:18px;}

/* CARD — perf: content-visibility bỏ qua render phần ngoài màn hình */
.card{
  content-visibility:auto;
  contain-intrinsic-size:340px;
  contain:content;
  background:linear-gradient(160deg,var(--card) 0%,rgba(16,33,58,.7) 100%);
  border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 26px rgba(0,0,0,.45);border-color:var(--accent);}
.card.hidden{display:none;}

.card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:rgba(0,122,204,.06);border-bottom:1px solid var(--border);cursor:pointer;}
.card-title{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;}
.card-title .idx{color:var(--text-secondary);font-size:11px;font-weight:400;}
.card-actions{display:flex;gap:6px;}
.icon-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-secondary);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:background .18s ease,color .18s ease,transform .18s ease;}
.icon-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.08);}
.icon-btn.fav.active{color:#FFD166;border-color:#FFD166;background:rgba(255,209,102,.1);}
.icon-btn.copied{background:var(--success);border-color:var(--success);color:#fff;}

.card-body{padding:16px;overflow:hidden;transition:max-height .25s ease,opacity .2s ease,padding .25s ease;}
.card-body.collapsed{max-height:0!important;padding-top:0;padding-bottom:0;opacity:0;}

.desc{color:var(--text-secondary);font-size:13px;margin-bottom:12px;line-height:1.5;}

.code-block{background:#00060E;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:var(--mono);font-size:12.6px;line-height:1.65;overflow-x:auto;white-space:pre;margin-bottom:12px;}
.tok-kw{color:#7FB7E8;font-weight:600;}
.tok-str{color:#F2C879;}
.tok-num{color:#8FD19E;}
.tok-com{color:#5C7896;font-style:italic;}
.tok-fn{color:#00B7FF;}
.tok-op{color:#EAF5FF;}
.tok-builtin{color:#C792EA;}
.tok-self{color:#E27E8D;font-style:italic;}

.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.meta-chip{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(0,122,204,.1);border:1px solid var(--border);color:var(--text-secondary);}
.meta-chip b{color:var(--accent-2);}

.example-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-2);margin:10px 0 5px 0;font-weight:700;}
.example-box{background:var(--bg-secondary);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:12px;color:var(--text-secondary);white-space:pre-wrap;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);}
.empty-state .big{font-size:40px;margin-bottom:10px;}

.footer{margin-top:50px;padding:24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;color:var(--text-secondary);font-size:12.5px;}
.footer b{color:var(--text);}

.fab{position:fixed;bottom:26px;right:26px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 24px rgba(0,122,204,.5);opacity:0;pointer-events:none;z-index:60;font-size:18px;transition:opacity .2s ease,transform .2s ease;}
.fab.show{opacity:1;pointer-events:auto;}
.fab:hover{transform:translateY(-4px) scale(1.05);}

.menu-toggle{display:none;width:38px;height:38px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);align-items:center;justify-content:center;cursor:pointer;margin-right:10px;}

@media (max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:-264px;transition:left .25s ease;height:100vh;}
  .sidebar.open{left:0;}
  .main{padding:0 16px 60px 16px;}
  .grid{grid-template-columns:1fr;}
  .menu-toggle{display:flex!important;}
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important;}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-text">Python Cheat Sheet</div>
        <div class="brand-sub">Abyss Edition</div>
      </div>
    </div>
    <div id="navGroup"></div>
  </aside>

  <main class="main">
    <div class="header">
      <div class="title-row">
        <div style="display:flex;align-items:center;">
          <div class="menu-toggle" id="menuToggle">☰</div>
          <div>
            <div class="title">Python Cheat Sheet</div>
            <div class="subtitle">Tra cứu nhanh — tìm kiếm, lưu yêu thích và sao chép code Python.</div>
          </div>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Tìm tên hàm...">
          <span class="search-kbd">Ctrl+F</span>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn primary" id="copyAllBtn">📋 Sao chép tất cả</button>
        <button class="btn" id="expandAllBtn">⬆ Mở rộng tất cả</button>
        <button class="btn" id="collapseAllBtn">⬇ Thu gọn tất cả</button>
        <button class="btn" id="exportTxtBtn">📄 Xuất TXT</button>
        <button class="btn" id="exportPyBtn">🐍 Xuất PY</button>
        <button class="btn ghost" id="backToTopBtn">⬆ Lên đầu trang</button>
      </div>
    </div>

    <div id="content"></div>

    <div class="footer">
      <div>Tổng số hàm: <b id="totalCount">0</b></div>
      <div>Số hàm yêu thích: <b id="favCount">0</b></div>
      <div>Phiên bản: <b>v2.0</b></div>
      <div>Cập nhật lần cuối: <b>07/2026</b></div>
    </div>
  </main>
</div>

<div class="fab" id="fab" title="Lên đầu trang (Ctrl+B)">↑</div>

<script>
/* ============================================================
   DỮ LIỆU DANH MỤC
   ============================================================ */
const CATEGORIES = [
  {id:'favorites', icon:'⭐', label:'Yêu thích'},
  {id:'number',    icon:'🔢', label:'Số học'},
  {id:'string',    icon:'🔤', label:'Chuỗi'},
  {id:'list',      icon:'📋', label:'Danh sách (List)'},
  {id:'tuple',     icon:'📚', label:'Tuple'},
  {id:'set',       icon:'🗂', label:'Set'},
  {id:'dict',      icon:'📖', label:'Dictionary'},
  {id:'math',      icon:'📐', label:'Math'},
  {id:'algo',      icon:'⚡', label:'Thuật toán'},
  {id:'builtin',   icon:'🧰', label:'Hàm dựng sẵn'},
];

function F(cat,title,code,desc,complexity,example){
  return {cat,title,code:code.trim(),desc,complexity,example:(example||'').trim()};
}

const FUNCS = [
/* ================= SỐ HỌC ================= */
F('number','Số nguyên tố','def snt(n):\n    i=2\n    while i*i<=n and n%i:i+=1\n    return n>1 and i*i>n','Kiểm tra một số có phải số nguyên tố hay không.','O(√n)','snt(17) -> True'),
F('number','Số chính phương','def scp(n):\n    return n>=0 and int(n**0.5)**2==n','Kiểm tra một số có phải số chính phương.','O(1)','scp(49) -> True'),
F('number','Số Harshad','def harshad(n):\n    return n%sum(map(int,str(n)))==0','Số chia hết cho tổng các chữ số của nó.','O(log n)','harshad(18) -> True'),
F('number','Số Armstrong','def armstrong(n):\n    d=str(n);p=len(d)\n    return n==sum(int(c)**p for c in d)','Số bằng tổng các chữ số lũy thừa theo số chữ số.','O(log n)','armstrong(153) -> True'),
F('number','Số hoàn hảo','def perfect(n):\n    return n==sum(i for i in range(1,n) if n%i==0)','Số bằng tổng các ước thực sự của nó.','O(n)','perfect(28) -> True'),
F('number','Strong Number','import math\ndef strong(n):\n    return n==sum(math.factorial(int(c)) for c in str(n))','Số bằng tổng giai thừa các chữ số của nó.','O(log n)','strong(145) -> True'),
F('number','Automorphic','def auto(n):\n    return str(n*n).endswith(str(n))','Số mà bình phương của nó kết thúc bằng chính nó.','O(log n)','auto(25) -> True'),
F('number','Palindrome số','def pal_num(n):\n    return str(n)==str(n)[::-1]','Số đọc xuôi và ngược giống nhau.','O(log n)','pal_num(1221) -> True'),
F('number','Duck Number','def duck(n):\n    s=str(n)\n    return "0" in s and not s.startswith("0")','Số chứa chữ số 0 nhưng không đứng đầu.','O(log n)','duck(3021) -> True'),
F('number','Neon Number','def neon(n):\n    return sum(map(int,str(n*n)))==n','Tổng chữ số của bình phương bằng chính số đó.','O(log n)','neon(9) -> True'),
F('number','Happy Number','def happy(n):\n    seen=set()\n    while n!=1 and n not in seen:\n        seen.add(n);n=sum(int(c)**2 for c in str(n))\n    return n==1','Số luôn tiến về 1 khi lặp tổng bình phương chữ số.','O(log n)','happy(19) -> True'),
F('number','Kaprekar Number','def kaprekar(n):\n    s=str(n*n)\n    return any(int(s[:i] or 0)+int(s[i:] or 0)==n for i in range(1,len(s)))','Bình phương có thể tách thành 2 phần cộng lại bằng số gốc.','O(log n)','kaprekar(45) -> True'),
F('number','Disarium Number','def disarium(n):\n    d=str(n)\n    return n==sum(int(c)**(i+1) for i,c in enumerate(d))','Tổng các chữ số lũy thừa theo vị trí bằng chính số đó.','O(log n)','disarium(89) -> True'),
F('number','Smith Number','def smith(n):\n    def pf(x):\n        f,d=[],2\n        while d*d<=x:\n            while x%d==0:f.append(d);x//=d\n            d+=1\n        return f+[x] if x>1 else f\n    return not snt(n) and sum(map(int,str(n)))==sum(int(c) for p in pf(n) for c in str(p))','Hợp số có tổng chữ số bằng tổng chữ số các thừa số nguyên tố.','O(√n)','smith(666) -> True'),
F('number','Kiểm tra Fibonacci','def is_fib(n):\n    a,b=0,1\n    while a<n:a,b=b,a+b\n    return a==n','Kiểm tra một số có nằm trong dãy Fibonacci.','O(log n)','is_fib(21) -> True'),
F('number','GCD (ƯCLN)','def gcd(a,b):\n    while b:a,b=b,a%b\n    return a','Ước chung lớn nhất bằng thuật toán Euclid.','O(log(min(a,b)))','gcd(48,18) -> 6'),
F('number','LCM (BCNN)','def lcm(a,b):\n    return a*b//gcd(a,b)','Bội chung nhỏ nhất dựa trên GCD.','O(log(min(a,b)))','lcm(4,6) -> 12'),
F('number','Liệt kê ước số','def uoc(n):\n    return [i for i in range(1,n+1) if n%i==0]','Trả về danh sách tất cả ước dương của n.','O(n)','uoc(12) -> [1,2,3,4,6,12]'),
F('number','Phân tích thừa số nguyên tố','def ptnt(n):\n    f,d=[],2\n    while d*d<=n:\n        while n%d==0:f.append(d);n//=d\n        d+=1\n    return f+[n] if n>1 else f','Phân tích một số thành các thừa số nguyên tố.','O(√n)','ptnt(60) -> [2,2,3,5]'),
F('number','Tổng chữ số','def tong_cs(n):\n    return sum(map(int,str(abs(n))))','Tính tổng các chữ số của một số.','O(log n)','tong_cs(1234) -> 10'),
F('number','Tích chữ số','def tich_cs(n):\n    p=1\n    for c in str(abs(n)):p*=int(c)\n    return p','Tính tích các chữ số của một số.','O(log n)','tich_cs(129) -> 18'),
F('number','Đếm chữ số','def dem_cs(n):\n    return len(str(abs(n)))','Đếm số lượng chữ số của một số.','O(log n)','dem_cs(9834) -> 4'),
F('number','Đảo số','def dao_so(n):\n    s=-1 if n<0 else 1\n    return s*int(str(abs(n))[::-1])','Đảo ngược thứ tự các chữ số, giữ nguyên dấu.','O(log n)','dao_so(-1234) -> -4321'),
F('number','Số chẵn','def chan(n):\n    return n%2==0','Kiểm tra số chẵn.','O(1)','chan(4) -> True'),
F('number','Số lẻ','def le(n):\n    return n%2!=0','Kiểm tra số lẻ.','O(1)','le(7) -> True'),
F('number','Số ngẫu nhiên','import random\ndef ngau_nhien(a,b):\n    return random.randint(a,b)','Sinh số nguyên ngẫu nhiên trong khoảng [a,b].','O(1)','ngau_nhien(1,6) -> 4'),
F('number','Số thực ngẫu nhiên','import random\ndef ngau_nhien_thuc(a,b):\n    return random.uniform(a,b)','Sinh số thực ngẫu nhiên trong khoảng [a,b].','O(1)','ngau_nhien_thuc(0,1) -> 0.73'),
F('number','Chuyển sang nhị phân','def nhi_phan(n):\n    return bin(n)[2:]','Chuyển số thập phân sang chuỗi nhị phân.','O(log n)','nhi_phan(10) -> "1010"'),
F('number','Chuyển sang bát phân','def bat_phan(n):\n    return oct(n)[2:]','Chuyển số thập phân sang chuỗi bát phân.','O(log n)','bat_phan(8) -> "10"'),
F('number','Chuyển sang thập lục phân','def thap_luc_phan(n):\n    return hex(n)[2:]','Chuyển số thập phân sang chuỗi hex.','O(log n)','thap_luc_phan(255) -> "ff"'),
F('number','Chuyển về thập phân','def ve_thap_phan(s,base):\n    return int(s,base)','Chuyển chuỗi ở hệ cơ số bất kỳ về thập phân.','O(len(s))','ve_thap_phan("1010",2) -> 10'),
F('number','Giai thừa','def giai_thua(n):\n    r=1\n    for i in range(2,n+1):r*=i\n    return r','Tính n giai thừa (n!) bằng vòng lặp.','O(n)','giai_thua(5) -> 120'),
F('number','Lũy thừa nhanh','def luy_thua(a,n):\n    r=1\n    while n:\n        if n&1:r*=a\n        a*=a;n>>=1\n    return r','Tính a^n bằng lũy thừa nhị phân nhanh.','O(log n)','luy_thua(2,10) -> 1024'),
F('number','Số Catalan','def catalan(n):\n    if n<=1:return 1\n    c=[1]*(n+1)\n    for i in range(2,n+1):\n        c[i]=sum(c[j]*c[i-1-j] for j in range(i))\n    return c[n]','Tính số Catalan thứ n bằng quy hoạch động.','O(n²)','catalan(4) -> 14'),
F('number','Tam giác Pascal','def pascal(rows):\n    t=[[1]*(i+1) for i in range(rows)]\n    for i in range(2,rows):\n        for j in range(1,i):t[i][j]=t[i-1][j-1]+t[i-1][j]\n    return t','Sinh tam giác Pascal với số hàng cho trước.','O(rows²)','pascal(4) -> [[1],[1,1],[1,2,1],[1,3,3,1]]'),
F('number','Dãy Collatz','def collatz(n):\n    seq=[n]\n    while n!=1:\n        n=n//2 if n%2==0 else 3*n+1\n        seq.append(n)\n    return seq','Sinh dãy Collatz (3n+1) cho tới khi đạt 1.','O(?), thường ngắn','collatz(6) -> [6,3,10,5,16,8,4,2,1]'),
F('number','Số tam giác','def so_tam_giac(n):\n    return n*(n+1)//2','Tính số tam giác thứ n (tổng 1..n).','O(1)','so_tam_giac(5) -> 15'),
F('number','Năm nhuận','def nam_nhuan(y):\n    return y%4==0 and (y%100!=0 or y%400==0)','Kiểm tra một năm có phải năm nhuận.','O(1)','nam_nhuan(2024) -> True'),
F('number','Spy Number','def spy(n):\n    d=[int(c) for c in str(n)]\n    p=1\n    for x in d:p*=x\n    return sum(d)==p','Số có tổng chữ số bằng tích chữ số.','O(log n)','spy(1124) -> True'),
F('number','Số nguyên tố cùng nhau','def coprime(a,b):\n    return gcd(a,b)==1','Kiểm tra hai số có nguyên tố cùng nhau không.','O(log(min(a,b)))','coprime(8,15) -> True'),
F('number','Euler Totient','def phi(n):\n    r=n;p=2;t=n\n    while p*p<=t:\n        if t%p==0:\n            while t%p==0:t//=p\n            r-=r//p\n        p+=1\n    if t>1:r-=r//t\n    return r','Đếm các số nhỏ hơn n và nguyên tố cùng nhau với n.','O(√n)','phi(9) -> 6'),
F('number','Tổng các ước','def tong_uoc(n):\n    return sum(i for i in range(1,n+1) if n%i==0)','Tính tổng tất cả ước dương của n.','O(n)','tong_uoc(12) -> 28'),
F('number','Số dư (Abundant)','def abundant(n):\n    return sum(i for i in range(1,n) if n%i==0)>n','Tổng ước thực sự lớn hơn chính số đó.','O(n)','abundant(12) -> True'),
F('number','Số thiếu (Deficient)','def deficient(n):\n    return sum(i for i in range(1,n) if n%i==0)<n','Tổng ước thực sự nhỏ hơn chính số đó.','O(n)','deficient(8) -> True'),
F('number','Bình phương cuối cùng của tổng chữ số','def digital_root(n):\n    while n>=10:n=sum(map(int,str(n)))\n    return n','Rút gọn số về một chữ số bằng cách lặp cộng chữ số.','O(log n)','digital_root(9875) -> 2'),

/* ============================================================
   TÔ SÁNG CÚ PHÁP (SYNTAX HIGHLIGHT)
   ============================================================ */
const PY_KEYWORDS=new Set(['def','return','while','for','if','else','elif','lambda','import','from','as','class','try','except','finally','raise','with','yield','in','is','not','and','or','pass','break','continue','global','nonlocal','assert','del','None','True','False']);
const PY_BUILTINS=new Set(['len','print','range','enumerate','zip','map','filter','sorted','reversed','sum','max','min','abs','int','str','float','list','dict','set','tuple','frozenset','isinstance','type','id','ord','chr','divmod','input','open','any','all','round','repr','format','vars','callable','globals','locals']);

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightPython(code){
  const tokenRe=/(#.*$)|("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|(\b\d+\.?\d*\b)|(\bself\b)|([A-Za-z_][A-Za-z0-9_]*)|([+\-*/%=<>!&|^~:]+)/gm;
  let result='',lastIndex=0,m;
  while((m=tokenRe.exec(code))!==null){
    result+=escapeHtml(code.slice(lastIndex,m.index));
    lastIndex=tokenRe.lastIndex;
    if(m[1]){result+='<span class="tok-com">'+escapeHtml(m[1])+'</span>';}
    else if(m[2]){result+='<span class="tok-str">'+escapeHtml(m[2])+'</span>';}
    else if(m[3]){result+='<span class="tok-num">'+escapeHtml(m[3])+'</span>';}
    else if(m[4]){result+='<span class="tok-self">'+escapeHtml(m[4])+'</span>';}
    else if(m[5]){
      const w=m[5];
      if(PY_KEYWORDS.has(w))result+='<span class="tok-kw">'+w+'</span>';
      else if(PY_BUILTINS.has(w))result+='<span class="tok-builtin">'+w+'</span>';
      else{
        const next=code[tokenRe.lastIndex];
        result+= next==='(' ? '<span class="tok-fn">'+w+'</span>' : w;
      }
    }
    else if(m[6]){result+='<span class="tok-op">'+escapeHtml(m[6])+'</span>';}
  }
  result+=escapeHtml(code.slice(lastIndex));
  return result;
}
/* Cache mã đã highlight — tính một lần duy nhất để tránh giật lag khi render lại */
FUNCS.forEach(f=>{f.highlighted=highlightPython(f.code);});

   ============================================================ */
function renderSidebar(){
  const navGroup=document.getElementById('navGroup');
  const frag=document.createDocumentFragment();

  const allItem=document.createElement('div');
  allItem.className='nav-item'+(activeCategory==='all'?' active':'');
  allItem.innerHTML=`<span>🏠</span><span>Tất cả</span><span class="nav-count">${FUNCS.length}</span>`;
  allItem.onclick=()=>{activeCategory='all';renderSidebar();renderContent();};
  frag.appendChild(allItem);

  CATEGORIES.forEach(cat=>{
    const count=cat.id==='favorites'?favorites.size:FUNCS.filter(f=>f.cat===cat.id).length;
    const item=document.createElement('div');
    item.className='nav-item'+(activeCategory===cat.id?' active':'');
    item.innerHTML=`<span>${cat.icon}</span><span>${cat.label}</span><span class="nav-count">${count}</span>`;
    item.onclick=()=>{
      activeCategory=cat.id;
      renderSidebar();
      renderContent();
      document.getElementById('sidebar').classList.remove('open');
    };
    frag.appendChild(item);
  });

  navGroup.innerHTML='';
  navGroup.appendChild(frag);
}

function matchesSearch(f,term){
  if(!term)return true;
  term=term.toLowerCase();
  return f.title.toLowerCase().includes(term)||
         f.desc.toLowerCase().includes(term)||
         f.code.toLowerCase().includes(term);
}

function getFilteredFuncs(){
  let list=FUNCS;
  if(activeCategory==='favorites'){list=list.filter(f=>favorites.has(f.id));}
  else if(activeCategory!=='all'){list=list.filter(f=>f.cat===activeCategory);}
  if(searchTerm){list=list.filter(f=>matchesSearch(f,searchTerm));}
  return list;
}

function buildCard(f,idx){
  const isFav=favorites.has(f.id);
  const card=document.createElement('div');
  card.className='card';
  card.dataset.id=f.id;
  card.innerHTML=`
    <div class="card-header" data-toggle>
      <div class="card-title"><span class="idx">#${idx}</span> ${f.title}</div>
      <div class="card-actions">
        <div class="icon-btn copy-btn" title="Sao chép">📋</div>
        <div class="icon-btn fav-btn ${isFav?'active':''}" title="Yêu thích">⭐</div>
        <div class="icon-btn collapse-btn" title="Thu gọn">▼</div>
      </div>
    </div>
    <div class="card-body">
      <div class="meta-row"><span class="meta-chip">Độ phức tạp: <b>${f.complexity||'N/A'}</b></span></div>
      <div class="desc">${f.desc}</div>
      <div class="code-block"><code>${f.highlighted}</code></div>
      ${f.example?`<div class="example-label">Ví dụ</div><div class="example-box">${escapeHtml(f.example)}</div>`:''}
    </div>
  `;
  card.querySelector('.card-header').addEventListener('click',(e)=>{
    if(e.target.closest('.card-actions'))return;
    toggleCollapse(card);
  });
  card.querySelector('.collapse-btn').addEventListener('click',(e)=>{e.stopPropagation();toggleCollapse(card);});
  card.querySelector('.copy-btn').addEventListener('click',(e)=>{e.stopPropagation();copyToClipboard(f.code,e.currentTarget);});
  card.querySelector('.fav-btn').addEventListener('click',(e)=>{e.stopPropagation();toggleFavorite(f.id,e.currentTarget);});
  return card;
}

function toggleCollapse(card){
  const body=card.querySelector('.card-body');
  const btn=card.querySelector('.collapse-btn');
  body.classList.toggle('collapsed');
  btn.textContent=body.classList.contains('collapsed')?'▶':'▼';
}

function copyToClipboard(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const original=btn.textContent;
    btn.textContent='✓';
    btn.classList.add('copied');
    btn.title='Đã sao chép';
    setTimeout(()=>{btn.textContent=original;btn.classList.remove('copied');btn.title='Sao chép';},1000);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
  });
}

function toggleFavorite(id,btn){
  if(favorites.has(id)){favorites.delete(id);btn.classList.remove('active');}
  else{favorites.add(id);btn.classList.add('active');}
  saveFavorites();
  renderSidebar();
  updateFooterCounts();
  if(activeCategory==='favorites')renderContent();
}

function renderContent(){
  const content=document.getElementById('content');
  const filtered=getFilteredFuncs();
  const frag=document.createDocumentFragment();

  if(filtered.length===0){
    const empty=document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML=`<div class="big">🔍</div><div>Không tìm thấy hàm nào phù hợp. Hãy thử từ khóa hoặc danh mục khác.</div>`;
    frag.appendChild(empty);
  } else if(activeCategory==='all'){
    CATEGORIES.filter(c=>c.id!=='favorites').forEach(cat=>{
      const items=filtered.filter(f=>f.cat===cat.id);
      if(items.length===0)return;
      frag.appendChild(buildSection(`${cat.icon} ${cat.label}`,items));
    });
  } else if(activeCategory==='favorites'){
    frag.appendChild(buildSection('⭐ Yêu thích',filtered));
  } else {
    const cat=CATEGORIES.find(c=>c.id===activeCategory);
    frag.appendChild(buildSection(`${cat.icon} ${cat.label}`,filtered));
  }

  content.innerHTML='';
  content.appendChild(frag);
}

function buildSection(heading,items){
  const section=document.createElement('div');
  section.className='category-section';
  section.innerHTML=`<div class="category-heading">${heading} <span class="count-pill">${items.length} hàm</span></div>`;
  const grid=document.createElement('div');
  grid.className='grid';
  const gridFrag=document.createDocumentFragment();
  items.forEach((f,i)=>gridFrag.appendChild(buildCard(f,i+1)));
  grid.appendChild(gridFrag);
  section.appendChild(grid);
  return section;
}

function updateFooterCounts(){
  document.getElementById('totalCount').textContent=FUNCS.length;
  document.getElementById('favCount').textContent=favorites.size;
}

/* ============================================================
   THANH CÔNG CỤ
   ============================================================ */
function expandAll(){
  document.querySelectorAll('.card-body').forEach(b=>b.classList.remove('collapsed'));
  document.querySelectorAll('.collapse-btn').forEach(b=>b.textContent='▼');
}
function collapseAll(){
  document.querySelectorAll('.card-body').forEach(b=>b.classList.add('collapsed'));
  document.querySelectorAll('.collapse-btn').forEach(b=>b.textContent='▶');
}
function copyAll(){
  const visible=getFilteredFuncs();
  const text=visible.map(f=>`# ${f.title}\n${f.code}\n`).join('\n'+'#'.repeat(40)+'\n\n');
  copyToClipboard(text,document.getElementById('copyAllBtn'));
}
function exportTxt(){
  const visible=getFilteredFuncs();
  const text=visible.map(f=>`${f.title}\n${'-'.repeat(f.title.length)}\n${f.desc}\n\n${f.code}\n\nĐộ phức tạp: ${f.complexity}\n`).join('\n'+'='.repeat(50)+'\n\n');
  downloadFile('python_cheatsheet.txt',text);
}
function exportPy(){
  const visible=getFilteredFuncs();
  const text=visible.map(f=>`# ${f.title}\n# ${f.desc}\n${f.code}\n`).join('\n\n');
  downloadFile('python_cheatsheet.py',text);
}
function downloadFile(filename,content){
  const blob=new Blob([content],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================================================
   GẮN SỰ KIỆN
   ============================================================ */
document.getElementById('searchInput').addEventListener('input',(e)=>{
  const val=e.target.value;
  clearTimeout(searchDebounce);
  searchDebounce=setTimeout(()=>{searchTerm=val;renderContent();},120);
});
document.getElementById('copyAllBtn').addEventListener('click',copyAll);
document.getElementById('expandAllBtn').addEventListener('click',expandAll);
document.getElementById('collapseAllBtn').addEventListener('click',collapseAll);
document.getElementById('exportTxtBtn').addEventListener('click',exportTxt);
document.getElementById('exportPyBtn').addEventListener('click',exportPy);
document.getElementById('backToTopBtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
document.getElementById('menuToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));

const fab=document.getElementById('fab');
fab.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
let scrollTicking=false;
window.addEventListener('scroll',()=>{
  if(!scrollTicking){
    requestAnimationFrame(()=>{
      if(window.scrollY>400)fab.classList.add('show');else fab.classList.remove('show');
      scrollTicking=false;
    });
    scrollTicking=true;
  }
},{passive:true});

document.addEventListener('keydown',(e)=>{
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key.toLowerCase()==='f'){e.preventDefault();document.getElementById('searchInput').focus();}
  else if(ctrl&&e.shiftKey&&e.key.toLowerCase()==='c'){e.preventDefault();copyAll();}
  else if(ctrl&&e.key.toLowerCase()==='e'){e.preventDefault();expandAll();}
  else if(ctrl&&e.key.toLowerCase()==='q'){e.preventDefault();collapseAll();}
  else if(ctrl&&e.key.toLowerCase()==='b'){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});}
});

/* ============================================================
   KHỞI TẠO
   ============================================================ */
renderSidebar();
renderContent();
updateFooterCounts();
</script>
</body>
</html>
